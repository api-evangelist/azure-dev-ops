aid: azure-dev-ops
name: Azure DevOps
description: >-
  Azure DevOps provides developer services for support teams to plan work,
  collaborate on code development, and build and deploy applications through
  a comprehensive set of REST APIs covering builds, releases, Git, pipelines,
  work items, test management, and artifacts.
